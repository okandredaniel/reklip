<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Recording Session</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#833cf6",
                        "background-light": "#f7f5f8",
                        "background-dark": "#0B1120", // Deep navy from request
                        "surface-dark": "#111B2E", // Lighter navy for cards
                        "surface-border": "#1E2D45",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .waveform-bar {
            border-radius: 999px;
            background: linear-gradient(180deg, #3B82F6 0%, #833cf6 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen flex flex-col overflow-hidden relative">
<!-- Top Status Bar Area -->
<div class="flex items-center justify-between px-6 pt-12 pb-4 shrink-0 z-10">
<!-- Live Indicator -->
<div class="flex items-center gap-2 bg-[#2e1818] border border-red-500/20 px-3 py-1.5 rounded-full">
<div class="size-2 bg-red-500 rounded-full animate-pulse"></div>
<span class="text-red-400 text-xs font-bold tracking-wider">LIVE</span>
</div>
<!-- Timer -->
<div class="font-mono text-2xl font-bold tracking-widest tabular-nums text-white drop-shadow-md">
            00:15:32
        </div>
<!-- System Icons -->
<div class="flex items-center gap-2 text-gray-400">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col w-full max-w-md mx-auto relative overflow-y-auto no-scrollbar pb-32">
<!-- Waveform Visualizer -->
<div class="h-32 w-full flex items-center justify-center gap-[3px] px-6 my-4 shrink-0">
<!-- Generating random heights for waveform effect -->
<div class="w-1.5 h-8 waveform-bar opacity-40"></div>
<div class="w-1.5 h-12 waveform-bar opacity-60"></div>
<div class="w-1.5 h-6 waveform-bar opacity-50"></div>
<div class="w-1.5 h-16 waveform-bar opacity-80"></div>
<div class="w-1.5 h-10 waveform-bar opacity-60"></div>
<div class="w-1.5 h-20 waveform-bar"></div>
<div class="w-1.5 h-14 waveform-bar opacity-80"></div>
<div class="w-1.5 h-24 waveform-bar"></div>
<div class="w-1.5 h-12 waveform-bar opacity-70"></div>
<div class="w-1.5 h-28 waveform-bar"></div>
<div class="w-1.5 h-16 waveform-bar opacity-90"></div>
<div class="w-1.5 h-32 waveform-bar shadow-[0_0_15px_rgba(59,130,246,0.6)]"></div>
<div class="w-1.5 h-20 waveform-bar opacity-90"></div>
<div class="w-1.5 h-12 waveform-bar opacity-70"></div>
<div class="w-1.5 h-24 waveform-bar"></div>
<div class="w-1.5 h-14 waveform-bar opacity-80"></div>
<div class="w-1.5 h-20 waveform-bar"></div>
<div class="w-1.5 h-8 waveform-bar opacity-60"></div>
<div class="w-1.5 h-12 waveform-bar opacity-50"></div>
<div class="w-1.5 h-6 waveform-bar opacity-40"></div>
</div>
<!-- Reactions Header -->
<div class="flex items-center justify-between px-6 mb-3 shrink-0">
<h3 class="text-xs font-bold text-gray-500 tracking-widest uppercase">Reactions</h3>
<button class="flex items-center gap-1.5 bg-surface-dark border border-surface-border px-3 py-1.5 rounded-full hover:bg-surface-border transition-colors">
<span class="material-symbols-outlined text-primary text-[18px]">edit_note</span>
<span class="text-xs font-semibold text-gray-300">Quick Note</span>
</button>
</div>
<!-- Reaction Buttons Row -->
<div class="flex items-center justify-between px-6 mb-8 shrink-0 overflow-x-auto no-scrollbar gap-2">
<!-- Love -->
<button class="flex flex-col items-center gap-1 min-w-[56px] group">
<div class="size-14 rounded-full bg-[#111B2E] border border-[#1E2D45] flex items-center justify-center group-hover:border-red-500/50 group-hover:bg-red-500/10 transition-all cursor-pointer shadow-lg">
<span class="material-symbols-outlined text-red-500 text-[28px] group-hover:scale-110 transition-transform">favorite</span>
</div>
<span class="text-[10px] font-medium text-gray-400">Love</span>
</button>
<!-- Agree -->
<button class="flex flex-col items-center gap-1 min-w-[56px] group">
<div class="size-14 rounded-full bg-[#111B2E] border border-[#1E2D45] flex items-center justify-center group-hover:border-blue-500/50 group-hover:bg-blue-500/10 transition-all cursor-pointer shadow-lg">
<span class="material-symbols-outlined text-blue-500 text-[28px] group-hover:scale-110 transition-transform">thumb_up</span>
</div>
<span class="text-[10px] font-medium text-gray-400">Agree</span>
</button>
<!-- Disagree -->
<button class="flex flex-col items-center gap-1 min-w-[56px] group">
<div class="size-14 rounded-full bg-[#111B2E] border border-[#1E2D45] flex items-center justify-center group-hover:border-orange-500/50 group-hover:bg-orange-500/10 transition-all cursor-pointer shadow-lg">
<span class="material-symbols-outlined text-orange-500 text-[28px] group-hover:scale-110 transition-transform">thumb_down</span>
</div>
<span class="text-[10px] font-medium text-gray-400">Disagree</span>
</button>
<!-- Question -->
<button class="flex flex-col items-center gap-1 min-w-[56px] group">
<div class="size-14 rounded-full bg-[#111B2E] border border-[#1E2D45] flex items-center justify-center group-hover:border-purple-500/50 group-hover:bg-purple-500/10 transition-all cursor-pointer shadow-lg">
<span class="material-symbols-outlined text-purple-500 text-[28px] group-hover:scale-110 transition-transform">help</span>
</div>
<span class="text-[10px] font-medium text-gray-400">Ask</span>
</button>
<!-- Important -->
<button class="flex flex-col items-center gap-1 min-w-[56px] group">
<div class="size-14 rounded-full bg-[#111B2E] border border-[#1E2D45] flex items-center justify-center group-hover:border-amber-500/50 group-hover:bg-amber-500/10 transition-all cursor-pointer shadow-lg">
<span class="material-symbols-outlined text-amber-500 text-[28px] group-hover:scale-110 transition-transform">warning</span>
</div>
<span class="text-[10px] font-medium text-gray-400">Impt</span>
</button>
<!-- Funny -->
<button class="flex flex-col items-center gap-1 min-w-[56px] group">
<div class="size-14 rounded-full bg-[#111B2E] border border-[#1E2D45] flex items-center justify-center group-hover:border-green-500/50 group-hover:bg-green-500/10 transition-all cursor-pointer shadow-lg">
<span class="material-symbols-outlined text-green-500 text-[28px] group-hover:scale-110 transition-transform">sentiment_very_satisfied</span>
</div>
<span class="text-[10px] font-medium text-gray-400">Funny</span>
</button>
</div>
<!-- Timeline Header -->
<div class="flex items-center justify-between px-6 mb-3 shrink-0">
<h3 class="text-xs font-bold text-gray-500 tracking-widest uppercase">Timeline Feed</h3>
<span class="text-[10px] text-gray-600 font-medium">AUTOSAVING...</span>
</div>
<!-- Timeline Feed -->
<div class="flex flex-col gap-3 px-6 pb-6">
<!-- Item 1: Agreed -->
<div class="flex items-start gap-4 p-4 rounded-2xl bg-surface-dark border border-surface-border">
<div class="flex flex-col items-center gap-1 min-w-[32px] pt-0.5">
<span class="text-xs font-mono text-gray-500">15:30</span>
<div class="w-px h-full bg-surface-border my-1 rounded-full"></div>
</div>
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<div class="size-6 rounded-full bg-blue-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-blue-400 text-[14px]">thumb_up</span>
</div>
<span class="text-sm font-semibold text-white">Agreed with statement</span>
</div>
</div>
</div>
<!-- Item 2: Note -->
<div class="flex items-start gap-4 p-4 rounded-2xl bg-surface-dark border border-surface-border">
<div class="flex flex-col items-center gap-1 min-w-[32px] pt-0.5">
<span class="text-xs font-mono text-gray-500">15:28</span>
<div class="w-px h-full bg-surface-border my-1 rounded-full"></div>
</div>
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<div class="size-6 rounded-full bg-gray-700/50 flex items-center justify-center">
<span class="material-symbols-outlined text-gray-300 text-[14px]">edit_note</span>
</div>
<span class="text-sm font-semibold text-white">Manual Note</span>
</div>
<p class="text-xs text-gray-400 leading-relaxed">Mentioned Q3 goals and revised budget allocation for the marketing team.</p>
</div>
</div>
<!-- Item 3: Image -->
<div class="flex items-start gap-4 p-4 rounded-2xl bg-surface-dark border border-surface-border">
<div class="flex flex-col items-center gap-1 min-w-[32px] pt-0.5">
<span class="text-xs font-mono text-gray-500">15:12</span>
<div class="w-px h-full bg-surface-border my-1 rounded-full"></div>
</div>
<div class="flex-1">
<div class="flex items-center gap-2 mb-2">
<div class="size-6 rounded-full bg-indigo-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-indigo-400 text-[14px]">image</span>
</div>
<span class="text-sm font-semibold text-white">Whiteboard Snapshot</span>
</div>
<div class="w-24 h-16 rounded-lg overflow-hidden border border-surface-border relative group cursor-pointer">
<div class="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition-colors"></div>
<img alt="Whiteboard with diagrams and notes during a meeting" class="w-full h-full object-cover" data-alt="Whiteboard with diagrams and notes during a meeting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpl9bLLV9vsIXb6hN-bhgNH1i4o7XSNa2DFipdnFeGmYeL0ASXElEonisA8oTypmnLhS9BN7ZdCmnCQS0jnurBqMwQVzUCMiQ1lXjBmCe3PqFI-gCSsToeoqT3hj5SCPJQ1GedTNWDMkZ-fnCdMuMqBr8-MY7DthTXRWBunKmJkhjlugxaQkvMWU_zvoFRhNcP1Ct7IzeeIq1KSfycRQ3_eNGtRt_DLIm4RXSgEwqCEXr1HzNNLrJ7c7Dl38ABGc9egMtCayl8mzVp"/>
</div>
</div>
</div>
<!-- Item 4: Question -->
<div class="flex items-start gap-4 p-4 rounded-2xl bg-surface-dark border border-surface-border opacity-70">
<div class="flex flex-col items-center gap-1 min-w-[32px] pt-0.5">
<span class="text-xs font-mono text-gray-500">15:05</span>
</div>
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<div class="size-6 rounded-full bg-purple-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-purple-400 text-[14px]">help</span>
</div>
<span class="text-sm font-semibold text-white">Question about timeline</span>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Action Area (Fixed) -->
<div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-[#0B1120] via-[#0B1120] to-transparent pt-12 pb-8 px-6 z-20 pointer-events-none">
<div class="flex items-center justify-between max-w-md mx-auto pointer-events-auto mb-6">
<!-- Photo Button -->
<button class="size-12 rounded-full bg-surface-dark border border-surface-border flex items-center justify-center text-white hover:bg-surface-border transition-colors shadow-lg">
<span class="material-symbols-outlined">photo_camera</span>
</button>
<!-- Stop Button -->
<button class="group relative flex items-center justify-center">
<!-- Outer Glow Ring -->
<div class="absolute inset-0 rounded-full bg-red-600 blur-xl opacity-20 group-hover:opacity-40 transition-opacity duration-500 animate-pulse-slow"></div>
<!-- Main Button -->
<div class="relative size-20 rounded-full bg-gradient-to-b from-red-500 to-red-700 border-4 border-[#3f1515] shadow-2xl flex items-col justify-center items-center flex-col cursor-pointer transform active:scale-95 transition-transform">
<div class="size-6 bg-white rounded-sm mb-1 shadow-sm"></div>
<span class="text-[9px] font-bold text-red-100 uppercase tracking-wide">Hold Stop</span>
</div>
<!-- Progress Ring SVG (Simulated) -->
<svg class="absolute inset-0 size-20 -rotate-90 pointer-events-none" viewbox="0 0 100 100">
<circle class="opacity-0 group-active:opacity-100 group-active:stroke-dashoffset-0 transition-all duration-[2000ms] ease-linear" cx="50" cy="50" fill="none" r="46" stroke="white" stroke-dasharray="289" stroke-dashoffset="289" stroke-width="2"></circle>
</svg>
</button>
<!-- Video Button -->
<button class="size-12 rounded-full bg-surface-dark border border-surface-border flex items-center justify-center text-white hover:bg-surface-border transition-colors shadow-lg">
<span class="material-symbols-outlined">videocam</span>
</button>
<!-- Thumbnail (Hidden on very small screens, shown on right normally, but design requested specific layout. Let's place it next to video or as a 4th item if needed, but per request: Photo | Stop | Video | Thumb) -->
<div class="hidden sm:flex size-10 rounded-lg overflow-hidden border border-surface-border relative ml-2">
<img alt="Thumbnail of most recent capture" class="w-full h-full object-cover" data-alt="Thumbnail of most recent capture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYly5bmDEtinGJasLu2I4ZPbqnzH3_AEp_9x_nFqBwbAD-FeycUOn4SnjeABkKmKkhQ1hDuurwQMmdunZQAg7QWyUZQ0nrLMPQlKQHLujsc9_ZdAsR9LvQ2dfoFWpmQE0pfxZfSrEJeI2C2Q-BmHlayT5A_LnNfDRIBJ3av5BpzAINYq80GX6iNmhC4HXzi8zZauM-cYx5jb2xqIvjAANHmHtid3PVpCY4lLFpwfzQpQMaMI4dIQNrztroSsYWx00s7tEpbZDeM63n"/>
</div>
</div>
<!-- Navigation Tab Bar -->
<div class="flex items-center justify-around max-w-md mx-auto pt-4 border-t border-surface-border/50 pointer-events-auto bg-[#0B1120]/95 backdrop-blur-sm pb-2">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined filled">mic</span>
<span class="text-[10px] font-medium">Record</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-500 hover:text-gray-300 transition-colors">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-medium">History</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-500 hover:text-gray-300 transition-colors">
<span class="material-symbols-outlined">library_music</span>
<span class="text-[10px] font-medium">Library</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-500 hover:text-gray-300 transition-colors">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</button>
</div>
</div>
</body></html>
