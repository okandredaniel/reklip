<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout &amp; Payment Details</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3B82F6", // Electric Blue
                        "background-light": "#f5f7f8", // Not used in this specific dark UI request but kept for requirement
                        "background-dark": "#0B1120", // Deep Navy
                        "surface-dark": "#111B2E", // Lighter Navy for cards
                        "success": "#22C55E", // Green
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom scrollbar hide for horizontal scrolling if needed */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white flex justify-center min-h-screen">
<!-- Mobile Frame Container -->
<div class="w-full max-w-md h-full min-h-screen bg-background-dark flex flex-col relative overflow-hidden shadow-2xl">
<!-- Header -->
<header class="flex items-center justify-between p-6 pt-12 pb-4 bg-background-dark z-10 sticky top-0">
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-dark/50 hover:bg-surface-dark transition-colors text-white">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Checkout</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Scroll Area -->
<main class="flex-1 overflow-y-auto px-6 pb-32">
<!-- Order Summary Card -->
<div class="mt-4 bg-surface-dark rounded-xl p-6 shadow-lg border border-white/5">
<div class="flex items-start justify-between mb-4">
<div>
<h2 class="text-xl font-bold text-white mb-1">Plus Plan - Monthly</h2>
<p class="text-slate-400 text-sm">Unlimited access to all features</p>
</div>
<div class="text-right">
<span class="block text-xl font-bold text-white">$9.99</span>
<span class="text-xs text-slate-400">/month</span>
</div>
</div>
<!-- Trial Badge -->
<div class="flex items-center gap-3 bg-success/10 rounded-lg p-3 mb-4 border border-success/20">
<div class="bg-success rounded-full p-0.5 flex items-center justify-center">
<span class="material-symbols-outlined text-black text-[14px] font-bold">check</span>
</div>
<div class="flex-1">
<p class="text-sm font-semibold text-white">7-day free trial included</p>
</div>
</div>
<div class="flex justify-between items-center text-xs text-slate-500 pt-2 border-t border-white/10">
<span>Today's charge: $0.00</span>
<span>First charge: Oct 24, 2023</span>
</div>
</div>
<!-- Payment Method Section -->
<div class="mt-8">
<h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-1">Payment Method</h3>
<!-- Method Selectors -->
<div class="flex gap-3 overflow-x-auto no-scrollbar mb-6 pb-2">
<!-- Selected Option -->
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-dark border-2 border-primary text-white transition-all shadow-[0_0_15px_rgba(59,130,246,0.3)]">
<span class="material-symbols-outlined text-[20px]">credit_card</span>
<span class="text-sm font-medium">Card</span>
</button>
<!-- Other Options -->
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-dark border border-white/10 text-slate-400 hover:text-white hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[20px]">phone_iphone</span> <!-- Approximating Apple Pay logo generic icon -->
<span class="text-sm font-medium">Apple Pay</span>
</button>
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-dark border border-white/10 text-slate-400 hover:text-white hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[20px]">android</span> <!-- Approximating Google Pay logo generic icon -->
<span class="text-sm font-medium">Google Pay</span>
</button>
</div>
<!-- Card Input Form -->
<div class="bg-surface-dark rounded-xl p-5 border border-white/5 space-y-4">
<!-- Card Number -->
<div class="space-y-1.5">
<label class="text-xs font-medium text-slate-400 ml-1">Card number</label>
<div class="relative group">
<input class="w-full bg-background-dark/50 border border-white/10 rounded-lg py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono" placeholder="0000 0000 0000 0000" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2">
<span class="block w-8 h-5 bg-white/10 rounded overflow-hidden" data-alt="visa icon placeholder"></span>
</div>
</div>
</div>
<!-- Expiry & CVC -->
<div class="flex gap-4">
<div class="flex-1 space-y-1.5">
<label class="text-xs font-medium text-slate-400 ml-1">Expiry</label>
<input class="w-full bg-background-dark/50 border border-white/10 rounded-lg py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono" placeholder="MM / YY" type="text"/>
</div>
<div class="flex-1 space-y-1.5">
<label class="text-xs font-medium text-slate-400 ml-1">CVC</label>
<div class="relative">
<input class="w-full bg-background-dark/50 border border-white/10 rounded-lg py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono" placeholder="123" type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 text-[18px]">help</span>
</div>
</div>
</div>
<!-- Name -->
<div class="space-y-1.5">
<label class="text-xs font-medium text-slate-400 ml-1">Name on card</label>
<input class="w-full bg-background-dark/50 border border-white/10 rounded-lg py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Trust Indicator -->
<div class="flex items-center justify-center gap-1.5 mt-6 opacity-60">
<span class="material-symbols-outlined text-[14px] text-slate-400">lock</span>
<p class="text-xs text-slate-400 font-medium">Secure checkout powered by <span class="font-bold text-white">Stripe</span></p>
</div>
</div>
</main>
<!-- Sticky Bottom Bar -->
<div class="absolute bottom-0 left-0 right-0 p-6 pt-4 bg-gradient-to-t from-background-dark via-background-dark to-transparent z-20">
<button class="w-full bg-primary hover:bg-blue-600 text-white font-bold text-lg py-4 rounded-full shadow-[0_4px_20px_rgba(59,130,246,0.4)] transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 group">
<span>Start Free Trial</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="text-center text-xs text-slate-500 mt-4">
                No commitment. Cancel online anytime.
            </p>
<!-- Home Indicator Safe Area visual fix -->
<div class="h-2 w-full"></div>
</div>
</div>
</body></html>
