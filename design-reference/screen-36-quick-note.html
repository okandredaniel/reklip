<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quick Note Entry Sheet</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                        "sheet-bg": "#111B2E", // Specific requested color
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "2rem", 
                        "xl": "3rem", 
                        "2xl": "1.5rem", // 24px
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Simulate iOS keyboard appearance */
        .ios-keyboard {
            background-color: #1c1c1e;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .key-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        .key {
            background-color: #454545;
            color: white;
            border-radius: 5px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex: 1;
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
        }
        .key.special {
            background-color: #303030;
        }
        .key-spacer {
            flex: 0.5;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black font-display antialiased h-screen w-full flex justify-center items-center overflow-hidden">
<!-- iPhone 15 Pro Frame Simulation -->
<div class="relative w-full max-w-[430px] h-full max-h-[932px] bg-background-dark overflow-hidden shadow-2xl ring-8 ring-[#1a1a1a] sm:rounded-[3rem]">
<!-- Status Bar Area -->
<div class="absolute top-0 w-full h-14 z-50 flex justify-between items-end px-6 pb-2 text-white">
<span class="font-medium text-sm">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px] rotate-90">battery_full</span>
</div>
</div>
<!-- Dynamic Island Placeholder -->
<div class="absolute top-3 left-1/2 -translate-x-1/2 w-[120px] h-[35px] bg-black rounded-full z-50 pointer-events-none"></div>
<!-- Background: Active Recording Context (Dimmed) -->
<div class="absolute inset-0 flex flex-col pt-32 px-6 bg-[#0f1218]">
<!-- Main Timer -->
<div class="flex flex-col items-center gap-6 opacity-40">
<div class="flex flex-col items-center gap-2">
<div class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></div>
<h1 class="text-white text-6xl font-thin tracking-tighter">00:15:32</h1>
<p class="text-gray-400 text-sm font-medium tracking-wide uppercase">Recording</p>
</div>
<!-- Waveform Visualization (CSS Gradient) -->
<div class="w-full h-48 flex items-center justify-center gap-1">
<div class="w-1.5 h-12 bg-gray-600 rounded-full"></div>
<div class="w-1.5 h-20 bg-gray-500 rounded-full"></div>
<div class="w-1.5 h-32 bg-gray-400 rounded-full"></div>
<div class="w-1.5 h-24 bg-gray-500 rounded-full"></div>
<div class="w-1.5 h-16 bg-gray-600 rounded-full"></div>
<div class="w-1.5 h-28 bg-gray-500 rounded-full"></div>
<div class="w-1.5 h-36 bg-gray-400 rounded-full"></div>
<div class="w-1.5 h-14 bg-gray-600 rounded-full"></div>
<div class="w-1.5 h-24 bg-gray-500 rounded-full"></div>
<div class="w-1.5 h-10 bg-gray-600 rounded-full"></div>
<!-- Faded out edges -->
</div>
</div>
<!-- Bottom Controls (Dimmed) -->
<div class="mt-auto mb-12 flex justify-between items-center px-4 opacity-40">
<div class="h-12 w-12 rounded-full bg-gray-800"></div>
<div class="h-20 w-20 rounded-full border-4 border-white flex items-center justify-center">
<div class="h-8 w-8 rounded-sm bg-red-500"></div>
</div>
<div class="h-12 w-12 rounded-full bg-gray-800"></div>
</div>
</div>
<!-- Overlay Scrim -->
<div class="absolute inset-0 bg-black/60 backdrop-blur-[2px] z-10"></div>
<!-- Bottom Sheet Interaction -->
<div class="absolute bottom-0 left-0 w-full z-20 flex flex-col justify-end h-full pointer-events-none">
<!-- The Sheet Content -->
<div class="bg-sheet-bg w-full rounded-t-[24px] shadow-2xl overflow-hidden flex flex-col pointer-events-auto transform transition-transform duration-300 ease-out border-t border-white/5">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-1">
<div class="h-1.5 w-12 rounded-full bg-white/20"></div>
</div>
<!-- Header / Timestamp -->
<div class="px-6 py-2 flex items-center justify-between">
<div class="flex items-center gap-2 bg-white/10 px-3 py-1.5 rounded-full backdrop-blur-md border border-white/5">
<span class="text-red-400 material-symbols-outlined text-[16px] animate-pulse">location_on</span>
<span class="text-gray-200 text-xs font-mono font-medium tracking-wide">00:15:32</span>
</div>
<span class="text-gray-400 text-xs uppercase tracking-wider font-semibold">Quick Note</span>
</div>
<!-- Text Input Area -->
<div class="px-6 py-2 flex-1 min-h-[140px]">
<textarea autofocus="" class="w-full h-full bg-transparent border-none p-0 text-white text-lg leading-relaxed placeholder:text-gray-500 focus:ring-0 resize-none font-display caret-primary" placeholder="What's happening now?"></textarea>
</div>
<!-- Action Bar (Sticky above keyboard) -->
<div class="bg-sheet-bg/95 backdrop-blur border-t border-white/5 px-4 py-3 flex items-center justify-between gap-4">
<button class="text-gray-400 hover:text-white text-[15px] font-medium px-4 py-2 transition-colors">
                        Cancel
                    </button>
<div class="flex-1 flex justify-end">
<button class="bg-primary hover:bg-blue-600 text-white text-[15px] font-semibold px-6 py-2.5 rounded-full shadow-lg shadow-blue-900/20 transition-all flex items-center gap-2">
<span>Save Note</span>
<span class="material-symbols-outlined text-[18px]">check</span>
</button>
</div>
</div>
<!-- Simulated iOS Keyboard (Visual Only) -->
<div class="ios-keyboard w-full pt-2 px-1">
<div class="flex justify-between px-4 pb-2 text-gray-400 text-sm">
<span>Suggested</span>
<div class="w-px h-4 bg-gray-600"></div>
<span class="text-white">"Interview"</span>
<div class="w-px h-4 bg-gray-600"></div>
<span class="text-white">"Action Item"</span>
</div>
<div class="key-row">
<div class="key">q</div><div class="key">w</div><div class="key">e</div><div class="key">r</div><div class="key">t</div><div class="key">y</div><div class="key">u</div><div class="key">i</div><div class="key">o</div><div class="key">p</div>
</div>
<div class="key-row px-4">
<div class="key">a</div><div class="key">s</div><div class="key">d</div><div class="key">f</div><div class="key">g</div><div class="key">h</div><div class="key">j</div><div class="key">k</div><div class="key">l</div>
</div>
<div class="key-row px-2">
<div class="key special"><span class="material-symbols-outlined text-[20px]">arrow_upward</span></div>
<div class="key">z</div><div class="key">x</div><div class="key">c</div><div class="key">v</div><div class="key">b</div><div class="key">n</div><div class="key">m</div>
<div class="key special"><span class="material-symbols-outlined text-[20px]">backspace</span></div>
</div>
<div class="key-row px-2">
<div class="key special flex-[2.5]">123</div>
<div class="key flex-[5] text-sm">space</div>
<div class="key special flex-[2.5] bg-blue-600 text-white font-semibold text-sm">return</div>
</div>
<!-- Home Indicator Area -->
<div class="h-8 w-full"></div>
</div>
</div>
</div>
<!-- iOS Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[130px] h-1.5 bg-white rounded-full z-50"></div>
</div>
</body></html>
