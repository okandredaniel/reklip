<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Empty Recording Library</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0B1120", 
                        "secondary-text": "#7B8BA3",
                        "surface-dark": "#151e2e",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white antialiased overflow-hidden h-screen w-full flex flex-col relative">
<!-- Status Bar Area (Mockup for iOS) -->
<div class="w-full h-[47px] flex items-end justify-between px-6 pb-2 shrink-0 z-20">
<div class="text-white text-[15px] font-semibold tracking-tight w-14 text-center">9:41</div>
<div class="h-[37px] w-[125px] bg-black rounded-full absolute left-1/2 -translate-x-1/2 top-2 z-30 flex items-center justify-end pr-3">
<div class="h-2 w-2 rounded-full bg-[#1e1e1e]"></div>
</div>
<div class="flex gap-2 items-center w-14 justify-end">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px] rotate-90">battery_full</span>
</div>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col relative w-full max-w-md mx-auto overflow-y-auto no-scrollbar pb-24">
<!-- Header Section -->
<header class="flex flex-col gap-4 px-5 pt-2 pb-4 sticky top-0 z-10 bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center justify-between">
<h1 class="text-3xl font-extrabold tracking-tight text-white">My Recordings</h1>
<button class="p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">more_horiz</span>
</button>
</div>
<!-- Search Bar -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary-text">search</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-none rounded-2xl leading-5 bg-surface-dark text-white placeholder-secondary-text focus:outline-none focus:ring-2 focus:ring-primary/50 sm:text-sm transition-all" placeholder="Search recordings..." type="text"/>
</div>
<!-- Filter Chips -->
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
<button class="flex items-center justify-center px-5 py-2 rounded-full bg-primary text-white text-sm font-semibold whitespace-nowrap shadow-lg shadow-primary/20">
                    All
                </button>
<button class="flex items-center justify-center px-5 py-2 rounded-full bg-surface-dark text-secondary-text text-sm font-medium whitespace-nowrap hover:bg-white/5 transition-colors">
                    Sermons
                </button>
<button class="flex items-center justify-center px-5 py-2 rounded-full bg-surface-dark text-secondary-text text-sm font-medium whitespace-nowrap hover:bg-white/5 transition-colors">
                    Lectures
                </button>
<button class="flex items-center justify-center px-5 py-2 rounded-full bg-surface-dark text-secondary-text text-sm font-medium whitespace-nowrap hover:bg-white/5 transition-colors">
                    Meetings
                </button>
</div>
</header>
<!-- Empty State Content (Centered) -->
<div class="flex-1 flex flex-col items-center justify-center px-6 -mt-10 min-h-[400px]">
<!-- Illustration -->
<div class="relative flex items-center justify-center w-48 h-48 mb-8">
<!-- Outer subtle rings -->
<div class="absolute inset-0 border border-dashed border-primary/20 rounded-full animate-pulse-slow"></div>
<div class="absolute inset-4 border border-primary/10 rounded-full"></div>
<!-- Inner circle bg -->
<div class="w-24 h-24 bg-surface-dark rounded-full flex items-center justify-center shadow-2xl shadow-primary/10 relative z-10">
<span class="material-symbols-outlined text-primary text-[48px]">mic_off</span>
</div>
<!-- Decorative dots -->
<div class="absolute top-2 right-10 w-2 h-2 bg-primary/40 rounded-full"></div>
<div class="absolute bottom-6 left-8 w-1.5 h-1.5 bg-secondary-text/40 rounded-full"></div>
</div>
<div class="flex flex-col items-center gap-3 max-w-[320px] text-center mb-10">
<h2 class="text-white text-2xl font-bold tracking-tight">No recordings yet</h2>
<p class="text-secondary-text text-base leading-relaxed">
                    Tap the button below to capture your first sermon, lecture, or meeting.
                </p>
</div>
<!-- CTA Button -->
<button class="group flex items-center gap-3 px-8 py-4 bg-primary hover:bg-blue-500 active:scale-95 transition-all rounded-full shadow-[0_0_40px_-10px_rgba(60,131,246,0.5)]">
<span class="material-symbols-outlined text-white">mic</span>
<span class="text-white text-base font-bold tracking-wide">Start Recording</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full bg-background-dark/90 backdrop-blur-xl border-t border-white/5 pb-8 pt-2 px-6 shrink-0 z-20">
<div class="flex justify-between items-end max-w-md mx-auto">
<a class="flex flex-col items-center gap-1.5 w-16 group" href="#">
<div class="text-secondary-text group-hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[26px]">mic</span>
</div>
<span class="text-[10px] font-medium text-secondary-text group-hover:text-primary transition-colors">Record</span>
</a>
<a class="flex flex-col items-center gap-1.5 w-16 group" href="#">
<div class="text-primary flex items-center justify-center relative">
<span class="material-symbols-outlined text-[26px] font-variation-settings-'FILL'1">library_music</span>
<span class="absolute -top-1 -right-1 w-2 h-2 bg-primary rounded-full"></span>
</div>
<span class="text-[10px] font-medium text-primary">Library</span>
</a>
<a class="flex flex-col items-center gap-1.5 w-16 group" href="#">
<div class="text-secondary-text group-hover:text-white transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[26px]">settings</span>
</div>
<span class="text-[10px] font-medium text-secondary-text group-hover:text-white transition-colors">Settings</span>
</a>
</div>
<!-- Home Indicator -->
<div class="w-[134px] h-[5px] bg-white rounded-full mx-auto mt-5 opacity-30"></div>
</nav>
<!-- Inline animation for the dashed circle -->
<style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</body></html>
