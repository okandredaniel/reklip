<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Collaborative Session</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0B1120", // Updated to Deep Navy as requested
                        "surface-dark": "#162032", // Slightly lighter for cards
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "2xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom pulsing animation for the blue dot */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(60, 131, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(60, 131, 246, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(60, 131, 246, 0); }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        /* Custom audio wave animation */
        @keyframes wave {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }
        .audio-bar {
            animation: wave 1s ease-in-out infinite;
        }
        .audio-bar:nth-child(odd) { animation-duration: 0.8s; }
        .audio-bar:nth-child(even) { animation-duration: 1.1s; }
        .audio-bar:nth-child(3n) { animation-duration: 1.3s; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-white transition-colors duration-200">
<div class="relative min-h-screen flex flex-col mx-auto w-full max-w-md overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Header / Top Bar -->
<header class="flex flex-col items-center pt-14 pb-4 px-6 z-10">

<span class="text-red-500 text-xs font-bold tracking-wider uppercase">Live Session</span>
</div>
<div class="flex items-center gap-2 bg-surface-dark/50 px-3 py-1.5 rounded-full backdrop-blur-sm border border-white/5">
<span class="material-symbols-outlined text-slate-400 text-[18px]">group</span>
<span class="text-white text-xs font-medium">4</span>
</div>
</div>
<h1 class="text-5xl font-bold tracking-tighter text-white tabular-nums mb-1 font-display">00:22:15</h1>
<p class="text-slate-400 text-sm font-medium">Recording in progress...</p>
</header>
<!-- Main Audio Visualizer Area -->
<main class="flex-1 flex flex-col justify-center relative px-6 py-4">

<div class="w-1.5 bg-primary/50 rounded-full h-12 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-16 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-24 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-12 audio-bar"></div>
<div class="w-1.5 bg-primary/80 rounded-full h-20 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-28 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-14 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-10 audio-bar"></div>
<div class="w-1.5 bg-primary/80 rounded-full h-24 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-32 audio-bar"></div>
<div class="w-1.5 bg-primary/80 rounded-full h-16 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-10 audio-bar"></div>
<div class="w-1.5 bg-primary rounded-full h-20 audio-bar"></div>
<div class="w-1.5 bg-primary/50 rounded-full h-8 audio-bar"></div>
<div class="w-1.5 bg-primary/30 rounded-full h-4 audio-bar"></div>
</div>
<!-- Active Status Card -->
<div class="mt-8 flex justify-center">
<div class="bg-primary/10 border border-primary/20 backdrop-blur-md rounded-full py-2 pl-2 pr-4 flex items-center gap-3 shadow-[0_0_15px_rgba(60,131,246,0.15)]">
<div class="relative flex items-center justify-center size-8">
<div class="absolute inset-0 bg-primary rounded-full animate-pulse-ring opacity-50"></div>
<div class="relative bg-primary size-2.5 rounded-full shadow-[0_0_8px_#3c83f6]"></div>
</div>
<span class="text-primary text-sm font-semibold tracking-wide">4 people are recording this session</span>
</div>
</div>
</main>
<!-- Group Reactions & Timeline -->
<section class="flex flex-col gap-4 px-6 pb-6 relative z-10">
<div class="flex items-center justify-between mb-2">

</div>

</div>
</div>
<div class="flex flex-col">
<p class="text-sm text-white"><span class="font-bold">Maria</span> loved this moment</p>
<span class="text-xs text-slate-400">Just now</span>

</div>
<!-- Item 2 -->
<div class="flex items-center gap-3 opacity-80">
<div class="relative shrink-0">
<div class="size-10 rounded-full bg-cover bg-center border border-white/10" data-alt="João profile picture" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBmcLy16Mf6kmnKw99W7hcbtyGJ3B9qY_zbUvzVQXRtOZDUzmY5IuLRCsRYEZf4TpDCGZe6dZa9XiOmr74N4GfcakI0iU-iRIrDePrEXpUsqRFW3oti2ENIco-lMNQ8GQs0PYzotFl6L29vLpuVXuTuAkCYFEOCzlnxs504y-INpRE1HkSRASuMdxWIc3WgsKXin0H7cRv_gOFedezghR-5mKjGpO7_dY7u8KXon-eaTCds-8HImfvCLl6xwHxm5VreJ1VVs8qtnowB');"></div>
<div class="absolute -bottom-1 -right-1 bg-[#162032] rounded-full p-0.5">
<span class="flex items-center justify-center size-5 bg-yellow-500/20 rounded-full text-[10px]">⭐</span>
</div>
</div>
<div class="flex flex-col">
<p class="text-sm text-white"><span class="font-bold">João</span> marked as important</p>
<span class="text-xs text-slate-400">1m ago</span>
</div>
</div>
<!-- Item 3 -->
<div class="flex items-center gap-3 opacity-50">
<div class="relative shrink-0">
<div class="size-10 rounded-full bg-cover bg-center border border-white/10" data-alt="Ana profile picture" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDOpzzVfUEBKa_AiLAN43fQw2GL8ZaRudGG2OP7LQEDo0BPylQlj9CSqA6xyNAlL6eXhejLpZd45r3z_HA7cBvthVG_sHQPXd1tEVsI9r4Lnxb-ynZJGfV67cby0moCIlVSIixv73cHBs89Vzs_0GFx_Gu0XUDJjWJhRqtJugcoQIwsJeLXPC8uAyMOojhAhd8r9Xvr2fx26bGKkOoBDQNhe0d0iysJU8trGCOFeqqMDtF5XO10_TrQuAgNbXJr0g8wfq8Ho4QT8MC7');"></div>
<div class="absolute -bottom-1 -right-1 bg-[#162032] rounded-full p-0.5">
<span class="flex items-center justify-center size-5 bg-blue-500/20 rounded-full text-[10px]">📷</span>
</div>
</div>
<div class="flex flex-col">

<span class="text-xs text-slate-400">2m ago</span>
</div>
</div>
</div>
<!-- Reaction Controls Palette -->
<div class="flex items-center justify-center gap-4 py-2 mt-2">
<button class="size-12 rounded-full bg-surface-dark hover:bg-white/10 flex items-center justify-center text-2xl transition-all active:scale-95 border border-white/5 shadow-lg group">
<span class="group-hover:scale-110 transition-transform">❤️</span>
</button>
<button class="size-12 rounded-full bg-surface-dark hover:bg-white/10 flex items-center justify-center text-2xl transition-all active:scale-95 border border-white/5 shadow-lg group">
<span class="group-hover:scale-110 transition-transform">⭐</span>
</button>
<button class="size-12 rounded-full bg-surface-dark hover:bg-white/10 flex items-center justify-center text-slate-200 transition-all active:scale-95 border border-white/5 shadow-lg group">
<span class="material-symbols-outlined text-[24px]">bookmark</span>
</button>
<button class="size-12 rounded-full bg-surface-dark hover:bg-white/10 flex items-center justify-center text-slate-200 transition-all active:scale-95 border border-white/5 shadow-lg group">
<span class="material-symbols-outlined text-[24px]">add_a_photo</span>
</button>
</div>
</section>
<!-- Bottom Controls -->
<footer class="pb-8 pt-4 px-6 bg-gradient-to-t from-background-dark via-background-dark to-transparent z-20">
<div class="flex items-center justify-between max-w-[320px] mx-auto">
<!-- Photo Button -->
<button class="flex flex-col items-center gap-1 group">
<div class="size-12 rounded-full bg-surface-dark flex items-center justify-center border border-white/10 group-active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Photo</span>
</button>
<!-- Stop Button (Hold to Stop) -->
<div class="relative group cursor-pointer select-none touch-none">
<!-- Progress Ring Indication (Decorative) -->
<div class="absolute -inset-2 rounded-full border-2 border-red-500/30 opacity-0 group-active:opacity-100 transition-opacity duration-700"></div>
<button class="size-20 rounded-full bg-red-600 flex items-center justify-center shadow-[0_0_20px_rgba(220,38,38,0.4)] transition-all active:scale-95 active:bg-red-700 relative z-10">
<div class="size-8 rounded bg-white"></div>
</button>
<span class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-red-500/80 uppercase tracking-wider whitespace-nowrap opacity-100 group-active:opacity-50 transition-opacity">Hold to stop</span>
</div>
<!-- Video Button -->
<button class="flex flex-col items-center gap-1 group">
<div class="size-12 rounded-full bg-surface-dark flex items-center justify-center border border-white/10 group-active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">videocam</span>
</div>
<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Video</span>
</button>
</div>
</footer>
</div>
</body></html>
