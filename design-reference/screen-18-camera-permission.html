<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Camera Access Permission</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2977f5",
                        "background-light": "#f5f7f8", // Kept from config, but main focus is dark mode requested
                        "background-dark": "#0B1120", // Deep navy as requested
                        "secondary-text": "#7B8BA3",
                        "surface-dark": "#151f32", // Slightly lighter for containers
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom height utility to ensure full screen on mobile */
        .min-h-screen-safe {
            min-height: 100vh;
            min-height: 100dvh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased selection:bg-primary/30">
<div class="relative flex flex-col justify-between w-full max-w-md mx-auto min-h-screen-safe overflow-hidden bg-white dark:bg-[#0B1120] px-6 py-8">
<!-- Top Spacer (for optical centering) -->
<div class="flex-none h-10"></div>
<!-- Main Content Area -->
<div class="flex flex-col items-center justify-center flex-grow w-full gap-8">
<!-- Central Icon -->
<div class="flex items-center justify-center w-24 h-24 rounded-full bg-primary/10 dark:bg-surface-dark mb-4 ring-1 ring-white/5 shadow-[0_0_40px_-10px_rgba(41,119,245,0.3)]">
<span class="material-symbols-outlined text-primary" style="font-size: 40px;">photo_camera</span>
</div>
<!-- Text Content -->
<div class="flex flex-col items-center gap-3 text-center">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Camera Access</h1>
<p class="text-base font-normal leading-relaxed text-slate-500 dark:text-[#7B8BA3] max-w-[280px]">
                    Capture slides, whiteboards, and key moments during recordings.
                </p>
</div>
<!-- Feature Pills -->
<div class="flex flex-wrap justify-center gap-3 mt-2">
<div class="flex items-center gap-2 px-4 py-2 border rounded-full border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300 bg-transparent">
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span class="text-sm font-medium">Timestamped photos</span>
</div>
<div class="flex items-center gap-2 px-4 py-2 border rounded-full border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300 bg-transparent">
<span class="material-symbols-outlined text-[18px]">videocam</span>
<span class="text-sm font-medium">Video clips</span>
</div>
</div>
</div>
<!-- Bottom Actions & Navigation -->
<div class="flex flex-col items-center w-full gap-6 pb-4">
<!-- Action Buttons -->
<div class="flex flex-col items-center w-full gap-4">
<button class="flex items-center justify-center w-full h-14 rounded-full bg-primary hover:bg-blue-600 active:scale-[0.98] transition-all text-white font-bold text-base shadow-lg shadow-primary/25">
                    Allow Camera
                </button>
<button class="text-slate-500 dark:text-[#7B8BA3] hover:text-primary dark:hover:text-white transition-colors text-sm font-medium py-2">
                    Not now
                </button>
</div>
<!-- Page Indicators -->
<div class="flex items-center justify-center gap-3 mt-2">
<div class="w-2 h-2 rounded-full bg-slate-300 dark:bg-[#2d3646]"></div>
<div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(41,119,245,0.6)]"></div>
<div class="w-2 h-2 rounded-full bg-slate-300 dark:bg-[#2d3646]"></div>
</div>
</div>
</div>
</body></html>
