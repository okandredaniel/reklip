<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>In-App Video Snippet Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0B1120", // Deep navy as requested
                        "accent-red": "#FF3B30",
                        "text-secondary": "#7B8BA3",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Main Container (Mobile Form Factor) -->
<div class="relative w-full max-w-md h-screen flex flex-col bg-[#0B1120]">
<!-- Status Bar Area (Mock) -->
<div class="w-full h-12 flex items-center justify-between px-6 pt-2">
<span class="text-xs font-medium text-white">9:41</span>
<div class="flex gap-1.5">
<span class="material-symbols-outlined text-white text-[16px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-white text-[16px]">wifi</span>
<span class="material-symbols-outlined text-white text-[16px]">battery_full</span>
</div>
</div>
<!-- Top Bar: Live Status & Audio Timer -->
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-accent-red animate-pulse"></div>
<span class="text-white font-bold tracking-wide text-sm">LIVE</span>
</div>
<div class="flex flex-col items-center">
<span class="text-white text-lg font-bold tracking-wider tabular-nums">00:15:32</span>
</div>
<!-- Electric Blue Waveform Visualization -->
<div class="flex items-center gap-0.5 h-6 w-16 justify-end">
<div class="w-1 bg-primary h-3 rounded-full animate-[pulse_1s_ease-in-out_infinite]"></div>
<div class="w-1 bg-primary h-5 rounded-full animate-[pulse_1.2s_ease-in-out_infinite]"></div>
<div class="w-1 bg-primary h-4 rounded-full animate-[pulse_0.8s_ease-in-out_infinite]"></div>
<div class="w-1 bg-primary h-6 rounded-full animate-[pulse_1.5s_ease-in-out_infinite]"></div>
<div class="w-1 bg-primary h-2 rounded-full animate-[pulse_0.9s_ease-in-out_infinite]"></div>
</div>
</div>
<!-- Viewfinder Area -->
<div class="flex-1 flex flex-col items-center justify-center px-6 py-2">
<div class="relative w-[85%] aspect-[9/16] rounded-2xl overflow-hidden bg-black shadow-2xl ring-1 ring-white/10 group">
<!-- Background Image -->
<div class="absolute inset-0 bg-cover bg-center opacity-80" data-alt="Blurred speaker presentation on stage in dark auditorium" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAGVfaO6nNQasHwW2a3pgAAeGnevuwa6hPXRdYMMfLVHEf5aH70fkagzk6_CbyHbnC4m81swv9Qc_ADx6tH4RPMc1-p_l-upIgQfGzsn7TvNBJX8_JeGcTFrYKtD7A4ac0LsKQnzWJfxPUNAx-bQQLO0WYJq4lUdolfktkAfin864UnOCRr_V8aP8Hvtz7WKSVBFqBsigcGsiHtW8fONQb8g7Vo_41U38K8cv3fmmbYA6Y4s6WVUc_fBn4uwGqsL9-dcnWCk3wK5h9I'); filter: blur(2px);">
</div>
<!-- Viewfinder Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/40"></div>
<!-- Viewfinder HUD Top -->
<div class="absolute top-4 left-4 right-4 flex items-center justify-between z-10">
<div class="bg-black/40 backdrop-blur-md px-3 py-1 rounded-full flex items-center gap-2 border border-white/10">
<div class="w-2 h-2 rounded-full bg-accent-red"></div>
<span class="text-white text-xs font-semibold tabular-nums tracking-wide">00:00:12</span>
</div>
<div class="bg-black/40 backdrop-blur-md px-2 py-1 rounded-md border border-white/10">
<span class="text-white text-[10px] font-bold tracking-wider">720P</span>
</div>
</div>
<!-- Focus Reticle (Decorative) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 border border-white/30 rounded-lg opacity-50"></div>
</div>
</div>
<!-- Controls Cluster -->
<div class="flex flex-col items-center justify-end pb-8 w-full gap-8 z-20">
<!-- Helper Text -->
<p class="text-text-secondary text-xs text-center px-8 font-medium leading-relaxed">
                Audio recording continues. Video will be timestamped and synced.
            </p>
<!-- Recording Actions -->
<div class="flex items-center justify-center w-full gap-10">
<!-- Flash Toggle -->
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-white/5 hover:bg-white/10 text-white transition-colors">
<span class="material-symbols-outlined text-2xl">flash_off</span>
</button>
<!-- Record Button (Active State) -->
<button class="relative flex items-center justify-center w-[72px] h-[72px] rounded-full border-4 border-white/20">
<div class="absolute inset-0 bg-accent-red rounded-full animate-pulse opacity-20"></div>
<div class="w-full h-full bg-accent-red rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(255,59,48,0.4)] transform transition-transform hover:scale-105 active:scale-95">
<div class="w-6 h-6 bg-white rounded-md"></div>
</div>
</button>
<!-- Switch Camera -->
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-white/5 hover:bg-white/10 text-white transition-colors">
<span class="material-symbols-outlined text-2xl">flip_camera_ios</span>
</button>
</div>
<!-- Bottom Actions -->
<div class="flex flex-col gap-4 w-full px-6 items-center">
<button class="w-full max-w-[200px] h-12 bg-primary hover:bg-primary/90 text-white text-base font-semibold rounded-full shadow-lg shadow-primary/20 transition-all">
                    Done
                </button>
<button class="text-text-secondary hover:text-white text-sm font-medium transition-colors py-2">
                    Cancel
                </button>
</div>
</div>
<!-- Navigation Bar Indicator -->
<div class="w-full h-6 flex justify-center items-end pb-2">
<div class="w-32 h-1 bg-white/20 rounded-full"></div>
</div>
</div>
</body></html>
