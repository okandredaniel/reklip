<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit User Profile - LiveCapture</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3c83f6",
              "background-light": "#f5f7f8", // Kept for config compliance but main bg is forced to navy
              "background-dark": "#0B1120", // Deep navy as requested
              "surface-dark": "#111B2E",    // Card style as requested
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0B1120] text-white font-display overflow-x-hidden min-h-screen">
<!-- Main Container -->
<div class="relative mx-auto w-full max-w-md bg-[#0B1120] min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 flex items-center justify-between bg-[#0B1120]/80 backdrop-blur-md px-4 py-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Edit Profile</h1>
<button class="flex items-center justify-center px-2 py-1 text-primary font-bold text-base hover:text-primary/80 transition-colors">
                Save
            </button>
</header>
<!-- Main Content Area -->
<main class="flex-1 px-4 pb-12 pt-2">
<!-- Avatar Section -->
<div class="flex flex-col items-center mb-8">
<div class="relative group cursor-pointer">
<!-- Avatar Image -->
<div class="w-[72px] h-[72px] rounded-full bg-cover bg-center border-2 border-[#111B2E]" data-alt="User profile portrait of a smiling woman" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCpj8uaV3ABJ-fvRJtyfnk1JNzBaK21SNphgYGEZWC-zeswHBvBFV26PPb8yWA8L0XGmypN5RzkXbfd7mKL0lLHIUTA1omVCvfevQw1J3znMXKyAVGWmipIUdq3lhSnRrsMW_egWQKkUpiSzDP5qslMRqiqeRDfXqggSiNW2TdN6jzSx_2lkag-TPaPkfr4_wOOR0Yllnil37MlfB605GIjMLZ_93lMrKvmKhaE_ZyHB7_YOW6fo9t5lrPTtisaaa-bh_mm6kCPQByJ');">
</div>
<!-- Camera Overlay -->
<div class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full backdrop-blur-[1px] group-hover:bg-black/50 transition-colors">
<span class="material-symbols-outlined text-white text-xl">photo_camera</span>
</div>
</div>
<button class="mt-3 text-sm text-primary font-medium">Change Photo</button>
</div>
<!-- Personal Info Form -->
<div class="flex flex-col gap-4">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-400 ml-1">Full Name</label>
<div class="bg-surface-dark rounded-2xl px-4 py-3 border border-transparent focus-within:border-primary/50 transition-colors">
<input class="w-full bg-transparent border-none p-0 text-white placeholder-gray-500 focus:ring-0 text-base" placeholder="Enter your name" type="text" value="Sarah Jenkins"/>
</div>
</div>
<!-- Email with Verified Badge -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-400 ml-1">Email</label>
<div class="bg-surface-dark rounded-2xl px-4 py-3 flex items-center gap-3 border border-transparent focus-within:border-primary/50 transition-colors">
<input class="flex-1 bg-transparent border-none p-0 text-white placeholder-gray-500 focus:ring-0 text-base" placeholder="Enter your email" type="email" value="sarah.jenkins@livecapture.io"/>
<div class="flex items-center text-green-500 bg-green-500/10 px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-sm font-bold mr-1">check_circle</span>
<span class="text-xs font-bold uppercase tracking-wide">Verified</span>
</div>
</div>
</div>
<!-- Church / Organization -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-400 ml-1">Church / Organization</label>
<div class="bg-surface-dark rounded-2xl px-4 py-3 border border-transparent focus-within:border-primary/50 transition-colors">
<input class="w-full bg-transparent border-none p-0 text-white placeholder-gray-500 focus:ring-0 text-base" placeholder="Enter organization" type="text" value="Grace Community Church"/>
</div>
</div>
<!-- Role Dropdown -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-400 ml-1">Role</label>
<div class="relative">
<select class="w-full bg-surface-dark rounded-2xl px-4 py-3 pr-10 border border-transparent text-white focus:ring-0 focus:border-primary/50 appearance-none text-base">
<option selected="" value="audio_engineer">Audio Engineer</option>
<option value="worship_leader">Worship Leader</option>
<option value="pastor">Pastor</option>
<option value="volunteer">Volunteer</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Location -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-400 ml-1">Location</label>
<div class="bg-surface-dark rounded-2xl px-4 py-3 flex items-center gap-2 border border-transparent focus-within:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-gray-500">location_on</span>
<input class="flex-1 bg-transparent border-none p-0 text-white placeholder-gray-500 focus:ring-0 text-base" placeholder="City, State" type="text" value="San Diego, CA"/>
</div>
</div>
</div>
<!-- Preferences Section -->
<div class="mt-8 mb-4">
<h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 mb-4">Preferences</h3>
<div class="flex flex-col gap-4">
<!-- Default Template -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-400 ml-1">Default Template</label>
<div class="relative">
<select class="w-full bg-surface-dark rounded-2xl px-4 py-3 pr-10 border border-transparent text-white focus:ring-0 focus:border-primary/50 appearance-none text-base">
<option selected="" value="sermon">Sermon</option>
<option value="worship">Worship Set</option>
<option value="podcast">Podcast Interview</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Language -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-400 ml-1">Language</label>
<div class="relative">
<select class="w-full bg-surface-dark rounded-2xl px-4 py-3 pr-10 border border-transparent text-white focus:ring-0 focus:border-primary/50 appearance-none text-base">
<option selected="" value="pt">Portuguese</option>
<option value="en">English (US)</option>
<option value="es">Spanish</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Audio Quality -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-400 ml-1">Audio Quality</label>
<div class="relative">
<select class="w-full bg-surface-dark rounded-2xl px-4 py-3 pr-10 border border-transparent text-white focus:ring-0 focus:border-primary/50 appearance-none text-base">
<option selected="" value="high">High (320kbps)</option>
<option value="med">Medium (192kbps)</option>
<option value="low">Low (128kbps)</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
</div>
<!-- Destructive Action -->
<div class="mt-12 flex justify-center pb-8">
<button class="text-red-500 font-medium text-base hover:text-red-400 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-xl">delete</span>
                    Delete Account
                </button>
</div>
</main>
</div>
</body></html>
