<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Asset Export Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0B1120", // Modified to requested Deep Navy
                        "secondary-text": "#7B8BA3",
                        "danger": "#EF4444",
                        "success": "#10B981"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom spinner animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        .animate-spin-normal {
            animation: spin 1s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen text-slate-900 dark:text-white antialiased overflow-hidden selection:bg-primary/30">
<!-- App Container (iPhone frame simulation) -->
<div class="relative mx-auto flex h-screen w-full max-w-md flex-col overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl sm:rounded-3xl sm:h-[850px] sm:my-8 border-none sm:border border-slate-800">
<!-- Status Bar Placeholder -->
<div class="flex h-12 w-full items-center justify-between px-6 pt-2 z-10">
<div class="text-sm font-semibold dark:text-white">9:41</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] dark:text-white">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px] dark:text-white">wifi</span>
<span class="material-symbols-outlined text-[18px] dark:text-white">battery_full</span>
</div>
</div>
<!-- Top App Bar -->
<div class="flex items-center justify-between px-4 py-2 z-10">
<!-- Back Button (Hidden/Disabled during export usually, but kept for layout consistency or minimizing) -->
<button class="flex h-10 w-10 items-center justify-center rounded-full text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">expand_more</span>
</button>
<!-- Title -->
<div class="text-white text-sm font-semibold tracking-wide uppercase opacity-0">Processing</div>
<!-- Right Action (Empty) -->
<div class="w-10"></div>
</div>
<!-- Main Content Scrollable Area -->
<div class="flex flex-1 flex-col items-center px-6 pt-4 pb-8 overflow-y-auto no-scrollbar">
<!-- Video Preview Card with Progress Ring -->
<div class="relative w-full aspect-square max-w-[340px] mb-8 group">
<!-- Background Image (Video Thumbnail) -->
<div class="absolute inset-0 rounded-2xl bg-cover bg-center shadow-lg overflow-hidden border border-white/5" data-alt="Abstract mountain landscape preview with purple and blue gradients" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDyJO4NvsoTfQJTM-GZVPpMl2qwnDJYkY2ani0bz4P5or_mcBzM3SDKU6sxbzWTB-Kf1IxoqhMFEEDh1KTwnqhizEUNTaJllDJpvMh0ZZbxHFo2wB4dcCJNTB9_c3oKJfmr_vWphOLd-plNbTefAfDIVN9nmMGD-uktiVjNfwNdusUPOhqWyphwDDCiJtxjM9iN81Jmw5Nui1ILAkIIVDxlE0P8ztIp1LOFbrFSda2ioEB_SLEDpKk5kljpZIZ_TcT3Bqhfe6VxzLIc");'>
<!-- Dark Overlay -->
<div class="absolute inset-0 bg-background-dark/60 backdrop-blur-[2px]"></div>
</div>
<!-- Progress Ring Overlay -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative flex items-center justify-center size-48">
<!-- SVG Ring -->
<svg class="size-full -rotate-90" viewbox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
<!-- Background Circle -->
<circle class="stroke-white/10" cx="18" cy="18" fill="none" r="16" stroke-width="1.5"></circle>
<!-- Progress Circle -->
<circle class="stroke-primary drop-shadow-[0_0_10px_rgba(60,131,246,0.6)]" cx="18" cy="18" fill="none" r="16" stroke-dasharray="100" stroke-dashoffset="16" stroke-linecap="round" stroke-width="1.5"></circle>
</svg>
<!-- Percentage Text -->
<div class="absolute flex flex-col items-center justify-center text-center">
<span class="text-5xl font-bold text-white tracking-tighter drop-shadow-md">84%</span>
</div>
</div>
</div>
<!-- Floating Video Icon Badge -->
<div class="absolute top-4 right-4 flex items-center justify-center size-8 rounded-full bg-white/10 backdrop-blur-md border border-white/10">
<span class="material-symbols-outlined text-white text-[18px]">videocam</span>
</div>
</div>
<!-- Text Content -->
<div class="w-full text-center space-y-2 mb-10">
<h1 class="text-2xl font-bold text-white tracking-tight">Exporting Your Video</h1>
<p class="text-secondary-text text-sm leading-relaxed max-w-[280px] mx-auto">
                    Rendering high-quality clips and applying your styles...
                </p>
</div>
<!-- Task List -->
<div class="w-full max-w-[340px] space-y-4">
<!-- Completed Task 1 -->
<div class="flex items-center gap-3 group">
<div class="flex size-6 shrink-0 items-center justify-center rounded-full bg-success/20 border border-success/30">
<span class="material-symbols-outlined text-success text-[16px] font-bold">check</span>
</div>
<span class="text-sm font-medium text-white/90">Optimizing resolution</span>
</div>
<!-- Completed Task 2 -->
<div class="flex items-center gap-3 group">
<div class="flex size-6 shrink-0 items-center justify-center rounded-full bg-success/20 border border-success/30">
<span class="material-symbols-outlined text-success text-[16px] font-bold">check</span>
</div>
<span class="text-sm font-medium text-white/90">Syncing captions</span>
</div>
<!-- Active Task -->
<div class="flex items-center gap-3 group">
<div class="flex size-6 shrink-0 items-center justify-center relative">
<!-- Loading Spinner -->
<div class="absolute inset-0 rounded-full border-2 border-primary/30 border-t-primary animate-spin-normal"></div>
</div>
<span class="text-sm font-medium text-primary">Applying brand styles...</span>
</div>
<!-- Future Task (Optional visual cue for next steps) -->
<div class="flex items-center gap-3 group opacity-40">
<div class="flex size-6 shrink-0 items-center justify-center rounded-full border border-white/20">
</div>
<span class="text-sm font-medium text-white">Finalizing export</span>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="flex flex-col items-center justify-end px-6 pb-8 pt-4 w-full bg-gradient-to-t from-background-dark via-background-dark to-transparent z-10">
<p class="text-xs text-secondary-text mb-6 text-center">
                Keep app open for faster export
            </p>
<button class="w-full py-3 px-4 rounded-xl text-danger font-medium text-sm hover:bg-danger/5 active:bg-danger/10 transition-colors flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform">cancel</span>
                Cancel Export
            </button>
</div>
<!-- Home Indicator (iPhone) -->
<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full z-20"></div>
</div>
</body></html>
