<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>In-App Camera Capture</title>
<!-- Material Symbols Link -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0B1120", // Adjusted to match user request "Deep Navy"
                        "secondary-text": "#7B8BA3",
                        "surface": "#1b2433",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        /* Custom grid overlay for viewfinder */
        .viewfinder-grid {
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 33.33% 33.33%;
        }
        
        /* Pulse animation for the recording dot */
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-red {
            animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen flex flex-col overflow-hidden selection:bg-primary selection:text-white">
<!-- Header / Status Bar -->
<header class="flex items-center justify-between px-6 py-4 pt-12 relative z-10 w-full shrink-0">
<!-- Live Indicator -->
<div class="flex items-center gap-2">
<div class="h-2.5 w-2.5 rounded-full bg-red-500 animate-pulse-red shadow-[0_0_8px_rgba(239,68,68,0.6)]"></div>
<span class="text-xs font-bold tracking-wider text-red-500 uppercase">Live</span>
</div>
<!-- Timer -->
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 pt-8">
<span class="font-mono text-xl font-medium tracking-wide tabular-nums text-white/90">00:15:32</span>
</div>
<!-- Waveform Visualizer -->
<div class="flex items-center justify-end gap-0.5 h-6">
<div class="w-1 bg-primary rounded-full h-2 animate-[pulse_1s_ease-in-out_infinite]"></div>
<div class="w-1 bg-primary rounded-full h-4 animate-[pulse_1.2s_ease-in-out_infinite]"></div>
<div class="w-1 bg-primary rounded-full h-6 animate-[pulse_0.8s_ease-in-out_infinite]"></div>
<div class="w-1 bg-primary rounded-full h-3 animate-[pulse_1.5s_ease-in-out_infinite]"></div>
<div class="w-1 bg-primary rounded-full h-5 animate-[pulse_1.1s_ease-in-out_infinite]"></div>
</div>
</header>
<!-- Main Content Area: Viewfinder -->
<main class="flex-1 flex flex-col items-center justify-center p-4 w-full relative">
<!-- Viewfinder Container -->
<div class="relative w-full h-full max-w-sm rounded-[24px] overflow-hidden bg-surface shadow-2xl border border-white/5 group">
<!-- Camera Feed Placeholder -->
<div class="absolute inset-0 bg-cover bg-center opacity-80" data-alt="Blurred view of a presentation slide projected on a screen in a dim room" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDVkgjZ4IRRhUUXC_DuJGmxR5a3iPY8pFyOKzXCvhfwUY7Bh-7QcuFc48Z6cPHQnBoqJdSggktZ7x9nLca1MpfxzIeSO7itmCEMVLZzJgSbXOxx_I4IHMA2nTCzNHkUnvv3Uj67vBJKoezKfMmmliku3Hc_D6ZSJkbua1b61bzMLbJITtmTY7Gve5FNlBkrQN_DJxWPflO2lLQlcTbMaeRLs-NAj8IWnA1saNZ_soupYXyo2xM0hryXuO9IMEjMwopCrbiuRVmQDcNy'); filter: blur(2px);">
</div>
<!-- Dark Overlay for better visibility of grid -->
<div class="absolute inset-0 bg-black/20"></div>
<!-- Viewfinder Grid Lines -->
<div class="absolute inset-0 viewfinder-grid pointer-events-none border border-white/10 rounded-[24px]"></div>
<!-- Focus Corners (Simulated) -->
<div class="absolute top-4 left-4 w-4 h-4 border-l-2 border-t-2 border-white/50 rounded-tl-lg"></div>
<div class="absolute top-4 right-4 w-4 h-4 border-r-2 border-t-2 border-white/50 rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 w-4 h-4 border-l-2 border-b-2 border-white/50 rounded-bl-lg"></div>
<div class="absolute bottom-4 right-4 w-4 h-4 border-r-2 border-b-2 border-white/50 rounded-br-lg"></div>
<!-- Slide Context Label (Optional hint) -->
<div class="absolute bottom-6 left-0 right-0 text-center">
<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-black/40 backdrop-blur-md text-[10px] font-medium tracking-wide text-white/80 border border-white/10">
<span class="material-symbols-outlined text-[12px]">filter_center_focus</span>
                    SLIDE CAPTURE
                </span>
</div>
</div>
</main>
<!-- Controls & Footer -->
<footer class="w-full shrink-0 flex flex-col items-center pb-8 pt-4 space-y-6 bg-background-dark">
<!-- Camera Controls Row -->
<div class="flex items-center justify-center gap-12 w-full px-8">
<!-- Flash Toggle -->
<button class="flex items-center justify-center size-12 rounded-full bg-surface/50 text-white hover:bg-surface transition-colors active:scale-95 border border-white/5">
<span class="material-symbols-outlined text-[24px]">flash_on</span>
</button>
<!-- Shutter Button -->
<button class="relative flex items-center justify-center size-[72px] rounded-full bg-white transition-transform active:scale-95 shadow-[0_0_24px_rgba(255,255,255,0.15)] group">
<div class="absolute inset-1 rounded-full border-2 border-black/10"></div>
<!-- Inner ring for styling -->
<div class="size-[60px] rounded-full bg-white border-2 border-gray-200"></div>
</button>
<!-- Switch Camera -->
<button class="flex items-center justify-center size-12 rounded-full bg-surface/50 text-white hover:bg-surface transition-colors active:scale-95 border border-white/5">
<span class="material-symbols-outlined text-[24px] rotate-90">flip_camera_ios</span>
</button>
</div>
<!-- Helper Text -->
<div class="text-center space-y-4">
<p class="text-secondary-text text-sm font-normal">Recording continues while you capture</p>
<!-- Cancel Action -->
<button class="px-6 py-2 text-white font-medium text-base hover:opacity-80 transition-opacity">
                Cancel
            </button>
</div>
<!-- Bottom Safe Area Spacer -->
<div class="h-4 w-full"></div>
</footer>
</body></html>
