<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account Registration</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8", // Not used in this specific design but required by rules
                        "background-dark": "#0B1120", // Deep Navy as requested
                        "surface-dark": "#111B2E",    // Input background
                        "border-dark": "#1E2D45",     // Input border
                        "text-secondary": "#7B8BA3",  // Secondary text
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem", // Approx 12px
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display min-h-screen flex flex-col items-center justify-center p-0 m-0">
<!-- Mobile Container -->
<div class="w-full max-w-md min-h-screen flex flex-col bg-background-light dark:bg-background-dark relative overflow-hidden">
<!-- Status Bar Area (Visual Spacer) -->
<div class="h-12 w-full"></div>
<!-- Header -->
<div class="px-6 pb-2 pt-2">
<button class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
</div>
<div class="px-6 pt-2 pb-6">
<h1 class="text-white tracking-tight text-[32px] font-bold leading-tight mb-2">Create Account</h1>
<p class="text-text-secondary text-base font-normal leading-normal">Start capturing what matters</p>
</div>
<!-- Form Section -->
<div class="flex-1 px-6 flex flex-col gap-4">
<!-- Full Name -->
<div class="space-y-2">
<label class="text-white text-sm font-medium leading-normal ml-1">Full name</label>
<div class="relative flex items-center">
<input class="w-full h-14 bg-surface-dark border border-border-dark rounded-lg px-4 pl-12 text-white placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Enter your full name" type="text"/>
<div class="absolute left-4 text-text-secondary flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
</div>
</div>
<!-- Email Address -->
<div class="space-y-2">
<label class="text-white text-sm font-medium leading-normal ml-1">Email address</label>
<div class="relative flex items-center">
<input class="w-full h-14 bg-surface-dark border border-border-dark rounded-lg px-4 pl-12 text-white placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Enter your email" type="email"/>
<div class="absolute left-4 text-text-secondary flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="text-white text-sm font-medium leading-normal ml-1">Password</label>
<div class="relative flex items-center">
<input class="w-full h-14 bg-surface-dark border border-border-dark rounded-lg px-4 pl-12 pr-12 text-white placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Enter your password" type="password"/>
<div class="absolute left-4 text-text-secondary flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<button class="absolute right-4 text-text-secondary hover:text-white transition-colors flex items-center">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="text-white text-sm font-medium leading-normal ml-1">Confirm password</label>
<div class="relative flex items-center">
<input class="w-full h-14 bg-surface-dark border border-border-dark rounded-lg px-4 pl-12 pr-12 text-white placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Re-enter your password" type="password"/>
<div class="absolute left-4 text-text-secondary flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<button class="absolute right-4 text-text-secondary hover:text-white transition-colors flex items-center">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Helper Text -->
<div class="flex items-center gap-2 pt-1 pl-1">
<div class="flex items-center justify-center w-4 h-4 rounded-full bg-green-500/20 text-green-500">
<span class="material-symbols-outlined text-[12px] font-bold">check</span>
</div>
<span class="text-text-secondary text-sm">Minimum 8 characters</span>
</div>
<!-- Create Account Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg text-base transition-colors shadow-lg shadow-blue-900/20">
                    Create Account
                </button>
</div>
<!-- Divider -->
<div class="relative flex py-4 items-center">
<div class="flex-grow border-t border-border-dark"></div>
<span class="flex-shrink-0 mx-4 text-text-secondary text-sm">or</span>
<div class="flex-grow border-t border-border-dark"></div>
</div>
<!-- Social Buttons -->
<div class="flex gap-4">
<button class="flex-1 h-14 flex items-center justify-center gap-3 bg-transparent border border-border-dark rounded-lg hover:bg-white/5 transition-colors">
<!-- Google Icon SVG -->
<svg class="w-6 h-6" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button class="flex-1 h-14 flex items-center justify-center gap-3 bg-transparent border border-border-dark rounded-lg hover:bg-white/5 transition-colors text-white">
<!-- Apple Icon SVG -->
<svg class="w-6 h-6 fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74 1.18 0 2.45-1.07 4.12-.89 1.54.16 2.76.82 3.51 2-2.92 1.83-2.39 6.22.61 7.42-.61 1.6-1.42 2.78-2.58 3.7h-.74zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.39-3.74 4.25z"></path>
</svg>
</button>
</div>
<!-- Footer Link -->
<div class="flex-1 flex items-end justify-center pb-8 pt-4">
<p class="text-text-secondary text-sm font-medium">
                    Already have an account? 
                    <a class="text-primary hover:text-primary/80 font-semibold ml-1" href="#">Sign in</a>
</p>
</div>
</div>
</div>
</body></html>
