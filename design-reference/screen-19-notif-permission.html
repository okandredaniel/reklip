<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Notification Access Permission</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2977f5",
                        "background-light": "#f5f7f8", // Kept for config requirement, but main bg is deep navy
                        "background-dark": "#0B1120", // Custom Deep Navy requested
                        "secondary-text": "#7B8BA3",
                        "surface-dark": "#162032",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B1120; /* Hardcoded deep navy base */
        }
        /* Hide scrollbar for cleaner mobile look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark min-h-screen flex flex-col justify-center items-center overflow-hidden selection:bg-primary/30">
<!-- Mobile Frame Container -->
<div class="relative w-full max-w-md h-screen max-h-[900px] flex flex-col bg-[#0B1120] text-white">
<!-- Status Bar Placeholder (iOS Style) -->
<div class="h-12 w-full flex items-end justify-between px-6 pb-2 select-none z-10">
<div class="text-white text-sm font-semibold tracking-wide">9:41</div>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px] text-white">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px] text-white">wifi</span>
<span class="material-symbols-outlined text-[18px] text-white">battery_full</span>
</div>
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col items-center justify-center px-6 relative z-0">
<!-- Hero Icon -->
<div class="mb-10 animate-fade-in-up">
<div class="w-24 h-24 rounded-full bg-[#162032] flex items-center justify-center shadow-lg ring-1 ring-white/5">
<span class="material-symbols-outlined text-primary text-[40px] leading-none">notifications_active</span>
</div>
</div>
<!-- Text Content -->
<div class="flex flex-col items-center gap-4 mb-8 text-center max-w-[320px]">
<h1 class="text-3xl font-bold tracking-tight text-white font-display">Stay Updated</h1>
<p class="text-secondary-text text-[15px] font-medium leading-relaxed">
                    Get notified when your recordings are processed and your content is ready to share.
                </p>
</div>
<!-- Value Props (Pills) -->
<div class="flex flex-wrap justify-center gap-3 mb-12">
<div class="flex items-center gap-2 px-1 py-1">
<span class="text-sm font-medium text-white/90">✅ Processing complete</span>
</div>
<div class="flex items-center gap-2 px-1 py-1">
<span class="text-sm font-medium text-white/90">🔕 No spam, ever</span>
</div>
</div>
</div>
<!-- Bottom Action Area -->
<div class="flex flex-col w-full px-6 pb-10 pt-4">
<!-- Primary Button -->
<button class="w-full h-14 bg-primary hover:bg-blue-600 active:scale-[0.98] transition-all duration-200 rounded-full flex items-center justify-center shadow-lg shadow-blue-900/20 mb-4">
<span class="text-white text-[16px] font-bold tracking-wide">Allow Notifications</span>
</button>
<!-- Secondary Link -->
<button class="w-full h-10 flex items-center justify-center bg-transparent group">
<span class="text-secondary-text text-sm font-semibold group-hover:text-white transition-colors">Not now</span>
</button>
<!-- Pagination Dots -->
<div class="flex items-center justify-center gap-3 mt-8">
<div class="h-2 w-2 rounded-full bg-[#3b4454]"></div>
<div class="h-2 w-2 rounded-full bg-[#3b4454]"></div>
<div class="h-2 w-2 rounded-full bg-primary ring-2 ring-primary/30"></div>
</div>
<!-- Home Indicator Placeholder -->
<div class="h-1 w-32 bg-white/20 rounded-full mx-auto mt-6"></div>
</div>
</div>
</body></html>
