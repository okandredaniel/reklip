<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Content Selection</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3B82F6", // Electric Blue
                        "background-light": "#f5f7f8",
                        "background-dark": "#0B1120", // Deep Navy requested
                        "card-dark": "#111B2E",
                        "card-border-dark": "#1E2D45",
                        "text-secondary": "#7B8BA3",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                    boxShadow: {
                        'glow': '0 0 15px rgba(59, 130, 246, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased selection:bg-primary selection:text-white">
<!-- Mobile Container -->
<div class="relative min-h-screen flex flex-col mx-auto w-full max-w-md bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Status Bar Placeholder (Safe Area) -->
<div class="h-12 w-full"></div>
<!-- Header / Navigation -->
<div class="flex items-center justify-between px-6 py-2">
<button class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<button class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors">
                Skip
            </button>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-6 pt-4 pb-8">
<!-- Typography Block -->
<div class="mb-8">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white mb-3">
                    What will you record most?
                </h1>
<p class="text-base font-normal leading-relaxed text-slate-500 dark:text-text-secondary">
                    We'll optimize your experience. You can always add more later.
                </p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Card 1: Selected State -->
<button class="group relative flex flex-col items-start p-5 rounded-2xl border-2 transition-all duration-300 bg-white dark:bg-card-dark border-primary dark:border-primary shadow-lg dark:shadow-glow ring-0 focus:outline-none text-left">
<div class="absolute top-4 right-4 h-6 w-6 rounded-full bg-primary flex items-center justify-center opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white text-[18px] font-bold">check</span>
</div>
<div class="w-12 h-12 rounded-xl bg-blue-50 dark:bg-blue-500/10 flex items-center justify-center text-3xl mb-4 group-hover:scale-110 transition-transform duration-300">
                        🙏
                    </div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">Church &amp; Sermons</h3>
<p class="text-sm text-slate-500 dark:text-text-secondary font-medium leading-normal">
                        Sermons, Bible studies, worship
                    </p>
</button>
<!-- Card 2: Education -->
<button class="group relative flex flex-col items-start p-5 rounded-2xl border transition-all duration-300 bg-white dark:bg-card-dark border-slate-200 dark:border-card-border-dark hover:border-blue-300 dark:hover:border-primary/50 text-left focus:outline-none">
<div class="absolute top-4 right-4 h-6 w-6 rounded-full border-2 border-slate-200 dark:border-slate-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-12 h-12 rounded-xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-3xl mb-4 group-hover:scale-110 transition-transform duration-300">
                        📚
                    </div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">Education</h3>
<p class="text-sm text-slate-500 dark:text-text-secondary font-medium leading-normal">
                        Lectures, classes, workshops
                    </p>
</button>
<!-- Card 3: Events -->
<button class="group relative flex flex-col items-start p-5 rounded-2xl border transition-all duration-300 bg-white dark:bg-card-dark border-slate-200 dark:border-card-border-dark hover:border-blue-300 dark:hover:border-primary/50 text-left focus:outline-none">
<div class="absolute top-4 right-4 h-6 w-6 rounded-full border-2 border-slate-200 dark:border-slate-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-12 h-12 rounded-xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-3xl mb-4 group-hover:scale-110 transition-transform duration-300">
                        🎤
                    </div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">Events</h3>
<p class="text-sm text-slate-500 dark:text-text-secondary font-medium leading-normal">
                        Conferences, talks, panels
                    </p>
</button>
<!-- Card 4: Work -->
<button class="group relative flex flex-col items-start p-5 rounded-2xl border transition-all duration-300 bg-white dark:bg-card-dark border-slate-200 dark:border-card-border-dark hover:border-blue-300 dark:hover:border-primary/50 text-left focus:outline-none">
<div class="absolute top-4 right-4 h-6 w-6 rounded-full border-2 border-slate-200 dark:border-slate-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-12 h-12 rounded-xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-3xl mb-4 group-hover:scale-110 transition-transform duration-300">
                        💼
                    </div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">Work</h3>
<p class="text-sm text-slate-500 dark:text-text-secondary font-medium leading-normal">
                        Meetings, standups, brainstorms
                    </p>
</button>
</div>
</main>
<!-- Footer Area -->
<div class="flex flex-col items-center px-6 pb-8 pt-4 w-full bg-background-light dark:bg-background-dark">
<!-- Pagination Dots -->
<div class="flex items-center justify-center gap-3 mb-6">
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-6 rounded-full bg-primary shadow-[0_0_8px_rgba(59,130,246,0.6)]"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Action Button -->
<button class="w-full h-14 rounded-xl bg-primary hover:bg-blue-600 active:scale-[0.98] transition-all flex items-center justify-center text-white font-bold text-lg tracking-wide shadow-lg shadow-blue-500/20">
                Continue
            </button>
<!-- Home Indicator Placeholder -->
<div class="h-1 w-32 rounded-full bg-slate-300 dark:bg-slate-700 mt-6"></div>
</div>
</div>
</body></html>
