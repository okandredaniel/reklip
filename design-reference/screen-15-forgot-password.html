<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LiveCapture - Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3caff6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0B1120", // Deep navy as requested
                        "surface-dark": "#111B2E", // Input background
                        "text-secondary": "#7B8BA3", // Secondary text
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'glow': '0 0 40px -10px rgba(60, 175, 246, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-0 m-0 text-slate-900 dark:text-white antialiased">
<!-- Mobile Frame Container -->
<div class="relative w-full max-w-md h-screen max-h-[932px] overflow-hidden bg-background-light dark:bg-background-dark flex flex-col">
<!-- Status Bar Area (Placeholder) -->
<div class="w-full h-12 shrink-0"></div>
<!-- Top Navigation -->
<div class="w-full px-4 py-2 flex items-center shrink-0">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors group">
<span class="material-symbols-outlined text-2xl dark:text-white text-slate-900 group-hover:text-primary transition-colors">arrow_back</span>
</button>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pt-8 pb-6">
<!-- Hero Icon -->
<div class="flex justify-center mb-8">
<div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-surface-dark dark:bg-[#111B2E] border border-slate-200 dark:border-slate-800 shadow-glow">
<!-- Glow effect layer -->
<div class="absolute inset-0 rounded-full bg-primary/20 blur-xl"></div>
<!-- Icon -->
<span class="material-symbols-outlined text-[40px] text-primary relative z-10" style="font-variation-settings: 'FILL' 1, 'wght' 600;">
                        lock_reset
                    </span>
</div>
</div>
<!-- Text Content -->
<div class="text-center mb-10 space-y-3">
<h1 class="text-3xl font-bold tracking-tight dark:text-white text-slate-900">
                    Reset Password
                </h1>
<p class="text-base font-normal leading-relaxed text-slate-500 dark:text-text-secondary px-2">
                    Enter your email and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-6 w-full" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email">
                        Email Address
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-[20px]">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 rounded-xl text-base bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700/50 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" id="email" name="email" placeholder="user@example.com" required="" type="email"/>
</div>
</div>
<button class="w-full py-4 px-6 rounded-xl bg-primary text-white font-semibold text-lg shadow-lg shadow-primary/25 hover:bg-blue-500 hover:shadow-primary/40 active:scale-[0.98] transition-all duration-200 mt-2 flex items-center justify-center gap-2" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="mt-auto pt-8 text-center">
<a class="inline-flex items-center gap-2 text-primary hover:text-blue-400 font-medium transition-colors text-sm py-2 px-4 rounded-lg hover:bg-primary/5" href="#">
<span class="material-symbols-outlined text-[18px]">keyboard_backspace</span>
                    Back to Sign In
                </a>
</div>
</main>
<!-- Bottom Safe Area Spacing -->
<div class="h-6 w-full shrink-0"></div>
</div>
</body></html>
