<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased overflow-hidden selection:bg-primary/30">
<div class="relative mx-auto h-screen w-full max-w-md bg-background-light dark:bg-background-dark flex flex-col overflow-hidden shadow-2xl">
<!-- Status Bar Area (Mock) -->

<div class="flex items-center justify-between px-4 pb-2 shrink-0">

<span class="material-symbols-outlined">arrow_back</span>

</div>

                </p>

<label class="text-sm font-medium text-text-secondary ml-2">Session Name</label>
<div class="relative">
<input class="w-full bg-surface-dark border-0 rounded-2xl py-4 px-5 text-white placeholder-slate-500 focus:ring-2 focus:ring-primary focus:bg-[#162032] transition-all" placeholder="e.g. Sunday Bible Study" type="text" value="Sunday Bible Study"/>
</div>
</div>
<!-- Event Type & Date Row -->
<div class="flex gap-4">
<div class="space-y-1.5 flex-1">
<label class="text-sm font-medium text-text-secondary ml-2">Event Type</label>
<div class="relative group">
<select class="w-full bg-surface-dark border-0 rounded-2xl py-4 pl-5 pr-10 text-white appearance-none focus:ring-2 focus:ring-primary focus:bg-[#162032] transition-all cursor-pointer">
<option>Sermon</option>
<option>Concert</option>
<option>Meeting</option>
<option>Interview</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none group-hover:text-primary transition-colors">arrow_drop_down</span>
</div>
</div>
<div class="space-y-1.5 flex-1">

<div class="relative group">
<input class="w-full bg-surface-dark border-0 rounded-2xl py-4 px-5 text-white placeholder-slate-500 focus:ring-2 focus:ring-primary focus:bg-[#162032] transition-all truncate" type="text" value="Today, 10:00 AM"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-sm">calendar_today</span>
</div>
</div>
</div>
</div>

<span class="text-text-secondary text-xs truncate max-w-[140px]">livecapture.app/j/8392...</span>
</div>
</div>
<button class="text-white/70 hover:text-white p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[20px]">content_copy</span>
</button>
</div>
<!-- Quick Share Icons -->
<div class="flex gap-4 justify-between mb-6">
<button class="flex-1 flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-dark border border-white/5 flex items-center justify-center group-hover:bg-[#162032] group-hover:border-primary/50 transition-all">

</button>

<span class="material-symbols-outlined text-blue-400">mail</span>
</div>
<span class="text-xs text-text-secondary group-hover:text-white transition-colors">Email</span>
</button>
<button class="flex-1 flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-dark border border-white/5 flex items-center justify-center group-hover:bg-[#162032] group-hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-white">qr_code_2</span>
</div>
<span class="text-xs text-text-secondary group-hover:text-white transition-colors">QR Code</span>
</button>
</div>
<!-- Email Input & Avatars -->
<div class="space-y-4">
<div class="relative">
<input class="w-full bg-surface-dark border-0 rounded-2xl py-4 pl-5 pr-14 text-white placeholder-slate-500 focus:ring-2 focus:ring-primary focus:bg-[#162032] transition-all" placeholder="Or enter emails..." type="email"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white hover:bg-blue-600 transition-colors shadow-lg shadow-blue-500/20">

<div class="w-10 h-10 rounded-full border-2 border-background-dark bg-surface-dark text-text-secondary text-xs font-medium flex items-center justify-center">

</div>
<span class="text-sm text-text-secondary ml-4">invited</span>
</div>
</div>
</div>
</div>
<!-- Sticky Bottom Button -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-dark via-background-dark to-transparent z-20">
<button class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-4 rounded-full shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all active:scale-[0.98] flex items-center justify-center gap-2">
